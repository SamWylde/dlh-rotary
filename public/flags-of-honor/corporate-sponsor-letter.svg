<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Flags of Honor 2026 corporate sponsor letter</title>
  <desc id="desc">Landscape flyer inviting businesses to become corporate sponsors of Flags of Honor 2026 during America&apos;s two hundred fiftieth celebration year.</desc>
  <rect width="1200" height="760" fill="#fbfaf7" />
  <path d="M0 34 C90 0 190 0 280 28 L280 110 C190 80 90 80 0 114 Z" fill="#c32026" />
  <path d="M0 70 C90 36 190 36 280 64 L280 84 C190 54 90 54 0 88 Z" fill="#ffffff" />
  <path d="M0 12 C36 8 74 18 114 40 L114 86 C74 64 36 54 0 58 Z" fill="#0c3b79" />
  <text x="600" y="86" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" text-anchor="middle">BE A CORPORATE SPONSOR OF</text>
  <text x="600" y="142" fill="#111111" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="58" font-weight="900" text-anchor="middle">FLAGS OF HONOR 2026</text>
  <text x="600" y="198" fill="#a0121b" font-family="Georgia, Times New Roman, serif" font-size="36" font-style="italic" font-weight="700" text-anchor="middle">America&apos;s 250th Celebration Year!</text>
  <text x="600" y="252" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="24" text-anchor="middle">Flags of Honor 2026 is coming to Triangle Park, Lock Haven, and will run through both</text>
  <text x="600" y="286" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="24" text-anchor="middle">Memorial Day and Flag Day.</text>
  <text x="600" y="344" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="22" text-anchor="middle">The Rotary Club of Downtown Lock Haven coordinates the patriotic display and invites you to</text>
  <text x="600" y="376" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="22" text-anchor="middle">become one of the event&apos;s Corporate Sponsors for a $100 donation.</text>
  <text x="600" y="436" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="22" text-anchor="middle">Sponsors receive a display sign, recognition on the large Triangle Park banner,</text>
  <text x="600" y="468" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="22" text-anchor="middle">a listing in The Express, and a place in the commemorative booklet available at the park</text>
  <text x="600" y="500" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="22" text-anchor="middle">and at the public ceremony on Sunday, May 24, 2026.</text>
  <text x="600" y="560" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="22" text-anchor="middle">The project raises funds for Central Mountain High School scholarships and for</text>
  <text x="600" y="592" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="22" text-anchor="middle">nonprofits that directly help local people.</text>
  <text x="600" y="652" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="22" text-anchor="middle">Thank you for considering a corporate sponsorship during this milestone year.</text>
  <rect x="330" y="684" width="540" height="44" rx="12" fill="#0c3b79" />
  <text x="600" y="712" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Email dlhrotary@gmail.com or call 814-571-5324 to sponsor</text>
</svg>
